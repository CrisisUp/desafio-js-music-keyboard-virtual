<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steinway Spirio - Virtual Piano</title>
  <link rel="stylesheet" href="./src/styles/reset.css">
  <link rel="stylesheet" href="./src/styles/main.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎹</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h2>Virtual Piano</h2>
      <div class="column">
        <span></span>
        <select id="song-select">
          <option value="saloonClassic">Saloon Classic 🤠</option>
          <option value="westTheme">Wild West Theme 🏜️</option>
          <option value="ragtime">Ragtime Piano 🎹</option>
          <option value="asaBranca">Asa Branca (Brasil) 🌵</option>
          <option value="batatinha">Batatinha Quando Nasce 🥔</option>
        </select>
        <button id="btn-spirio" class="btn-spirio">Play</button>
      </div>
      <div class="column">
        <span></span>
        <input type="range" id="volume-slider" min="0" max="1" value="0.5" step="any">
      </div>
      <div class="column">
        <span></span>
        <input type="checkbox" id="keys-check" checked>
      </div>
    </header>

    <div class="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <ul class="piano-keys">
      <li class="key white" data-key="a"><span>Dó</span></li>
      <li class="key black" data-key="w"><span>Dó#</span></li>
      <li class="key white" data-key="s"><span>Ré</span></li>
      <li class="key black" data-key="e"><span>Ré#</span></li>
      <li class="key white" data-key="d"><span>Mi</span></li>
      <li class="key white" data-key="f"><span>Fá</span></li>
      <li class="key black" data-key="t"><span>Fá#</span></li>
      <li class="key white" data-key="g"><span>Sol</span></li>
      <li class="key black" data-key="y"><span>Sol#</span></li>
      <li class="key white" data-key="h"><span>Lá</span></li>
      <li class="key black" data-key="u"><span>Lá#</span></li>
      <li class="key white" data-key="j"><span>Si</span></li>
      <li class="key white octave-2" data-key="k"><span>Dó</span></li>
      <li class="key black octave-2" data-key="o"><span>Dó#</span></li>
      <li class="key white octave-2" data-key="l"><span>Ré</span></li>
      <li class="key black octave-2" data-key="p"><span>Ré#</span></li>
      <li class="key white octave-2" data-key=";"><span>Mi</span></li>
    </ul>
  </div>
  <script src="./src/scripts/engine.js" defer></script>
</body>

</html>
